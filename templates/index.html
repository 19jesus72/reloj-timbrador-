<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reloj Timbrador - Técnicos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #241f47;
            --accent: #fee004;
            --accent-hover: #e6c803;
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.7);
            --card-bg: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 0.5rem;
        }
        
        .header h1 span {
            color: var(--accent);
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .logout-link {
            position: absolute;
            top: 1rem;
            right: 1.5rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.8rem;
            transition: color 0.2s;
        }
        
        .logout-link:hover {
            color: var(--accent);
        }

        .form-group {
            margin-bottom: 1.25rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        select, textarea {
            width: 100%;
            padding: 1rem;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }
        
        select option {
            background-color: var(--bg-primary);
            color: var(--text-main);
        }

        select:focus, textarea:focus {
            border-color: var(--accent);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        #actividades-container {
            display: none; /* Oculto por defecto, se muestra al marcar salida */
            animation: slideDown 0.3s ease-out forwards;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .buttons-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .btn {
            width: 100%;
            padding: 1.25rem;
            border: none;
            border-radius: 8px;
            font-size: 1.125rem;
            font-weight: 700;
            color: var(--bg-primary);
            background-color: var(--accent);
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .btn-entrada {
            background-color: var(--accent);
        }

        .btn-entrada:hover:not(:disabled) {
            background-color: var(--accent-hover);
        }

        .btn-salida {
            background-color: transparent;
            color: var(--accent);
            border: 2px solid var(--accent);
        }

        .btn-salida:hover:not(:disabled) {
            background-color: rgba(254, 224, 4, 0.1);
        }

        .status {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.875rem;
            min-height: 1.5rem;
            border-radius: 8px;
            padding: 0.5rem;
            transition: all 0.3s ease;
            opacity: 0;
        }
        
        .status.show {
            opacity: 1;
        }

        .status.error {
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.4);
        }

        .status.success {
            background: rgba(16, 185, 129, 0.2);
            color: #6ee7b7;
            border: 1px solid rgba(16, 185, 129, 0.4);
        }

        .status.loading {
            background: rgba(254, 224, 4, 0.1);
            color: var(--accent);
            border: 1px solid rgba(254, 224, 4, 0.2);
        }

        .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(36, 31, 71, 0.3);
            border-radius: 50%;
            border-top-color: var(--bg-primary);
            animation: spin 1s ease-in-out infinite;
        }
        
        .btn-salida .loader {
            border: 3px solid rgba(254, 224, 4, 0.3);
            border-top-color: var(--accent);
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="{{ url_for('logout_tecnico') }}" class="logout-link">Cerrar Sesión</a>
        
        <div class="header">
            <h1>Hola, <span>{{ session.get('tecnico_nombre') }}</span></h1>
            <p>Registra tu asistencia de campo</p>
        </div>

        <div class="form-group">
            <label for="ingeniero">Ingeniero a Cargo *</label>
            <select id="ingeniero" required>
                <option value="" disabled selected>Selecciona a tu supervisor...</option>
                <option value="Daniel Vizuete">Daniel Vizuete</option>
                <option value="David Maza">David Maza</option>
                <option value="Edwin Llumiquinga">Edwin Llumiquinga</option>
            </select>
        </div>

        <div class="form-group" id="actividades-container">
            <label for="actividades">Desglose de actividades diarias *</label>
            <textarea id="actividades" placeholder="Describe brevemente las tareas realizadas hoy..."></textarea>
        </div>

        <div class="buttons-container">
            <button class="btn btn-entrada" onclick="registrar('Entrada')" id="btn-entrada">
                <span class="btn-text">Registrar Entrada</span>
                <div class="loader" id="loader-entrada"></div>
            </button>
            <button class="btn btn-salida" onclick="registrar('Salida')" id="btn-salida">
                <span class="btn-text">Registrar Salida</span>
                <div class="loader" id="loader-salida"></div>
            </button>
        </div>

        <div id="status" class="status"></div>
    </div>

    <script>
        const statusEl = document.getElementById('status');
        const actividadesContainer = document.getElementById('actividades-container');
        const actividadesInput = document.getElementById('actividades');
        let salidaEnProceso = false;

        function setStatus(message, type) {
            statusEl.textContent = message;
            if (type) {
                statusEl.className = `status show ${type}`;
            } else {
                statusEl.className = 'status';
            }
        }

        function toggleLoading(btnId, isLoading) {
            const btn = document.getElementById(`btn-${btnId.toLowerCase()}`);
            const text = btn.querySelector('.btn-text');
            const loader = btn.querySelector('.loader');
            
            if (isLoading) {
                text.style.display = 'none';
                loader.style.display = 'block';
                document.getElementById('btn-entrada').disabled = true;
                document.getElementById('btn-salida').disabled = true;
            } else {
                text.style.display = 'block';
                loader.style.display = 'none';
                document.getElementById('btn-entrada').disabled = false;
                document.getElementById('btn-salida').disabled = false;
            }
        }

        function registrar(tipoRegistro) {
            const ingeniero = document.getElementById('ingeniero').value;
            
            if (!ingeniero) {
                setStatus('Por favor, selecciona al Ingeniero a Cargo.', 'error');
                return;
            }

            // Lógica para exigir actividades en salida
            if (tipoRegistro === 'Salida') {
                if (!salidaEnProceso) {
                    // Primer clic: muestra el textarea y cambia el botón
                    actividadesContainer.style.display = 'block';
                    salidaEnProceso = true;
                    document.querySelector('#btn-salida .btn-text').textContent = 'Confirmar Salida';
                    actividadesInput.focus();
                    setStatus('Por favor, describe tus actividades antes de confirmar la salida.', 'loading');
                    return;
                } else {
                    // Segundo clic: verifica que esté lleno
                    if (!actividadesInput.value.trim()) {
                        setStatus('Las actividades diarias son obligatorias.', 'error');
                        actividadesInput.focus();
                        return;
                    }
                }
            }

            if (!navigator.geolocation) {
                setStatus('Tu navegador no soporta geolocalización.', 'error');
                alert('Geolocalización no soportada por el navegador.');
                return;
            }

            setStatus(`Obteniendo ubicación para ${tipoRegistro}...`, 'loading');
            toggleLoading(tipoRegistro, true);

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const datos = {
                        tipo_registro: tipoRegistro,
                        latitud: position.coords.latitude,
                        longitud: position.coords.longitude,
                        precision_gps: position.coords.accuracy,
                        ingeniero_a_cargo: ingeniero,
                        actividades_diarias: tipoRegistro === 'Salida' ? actividadesInput.value.trim() : ''
                    };

                    enviarDatos(datos, tipoRegistro);
                },
                (error) => {
                    toggleLoading(tipoRegistro, false);
                    let mensajeError = 'Error al obtener ubicación.';
                    
                    if (error.code === error.PERMISSION_DENIED) {
                        mensajeError = 'PERMISO DENEGADO: Debes activar la ubicación.';
                        alert('ACCESO A GPS DENEGADO\n\nEl sistema requiere obligatoriamente conocer su ubicación. Por favor, permita el acceso en su navegador e intente de nuevo.');
                    } else if (error.code === error.POSITION_UNAVAILABLE) {
                        mensajeError = 'La información de ubicación no está disponible.';
                    } else if (error.code === error.TIMEOUT) {
                        mensajeError = 'Tiempo de espera agotado al obtener ubicación.';
                    }
                    
                    setStatus(mensajeError, 'error');
                },
                {
                    enableHighAccuracy: true,
                    timeout: 15000,
                    maximumAge: 0
                }
            );
        }

        async function enviarDatos(datos, tipoRegistro) {
            try {
                const apiUrl = "{{ url_for('registrar_asistencia') }}";
                
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(datos)
                });

                const result = await response.json();

                if (response.ok) {
                    setStatus(`¡Éxito! ${result.mensaje}`, 'success');
                    
                    // Resetear formulario de salida
                    if (tipoRegistro === 'Salida') {
                        salidaEnProceso = false;
                        document.querySelector('#btn-salida .btn-text').textContent = 'Registrar Salida';
                        actividadesContainer.style.display = 'none';
                        actividadesInput.value = '';
                    }
                    document.getElementById('ingeniero').value = '';
                    
                    setTimeout(() => {
                        setStatus('', '');
                    }, 4000);
                } else {
                    setStatus(`Error: ${result.error}`, 'error');
                }
            } catch (error) {
                setStatus('Error de red al intentar comunicarse con el servidor.', 'error');
            } finally {
                toggleLoading(tipoRegistro, false);
            }
        }
    </script>
</body>
</html>
